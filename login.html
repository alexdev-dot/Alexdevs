<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>
  <body>

    <!-- Back to home button -->
     <a href="index.html" class="back-arrow" title="Go back to home">
      <i class="fa fa-arrow-left" arial-hidden="true"></i>
     </a>

     <div class="background"></div>
    <div class="container">
      <form id="loginForm" class="glass-card" autocomplete="on" novalidate>
        <h2>Welcome Back</h2>
        <p>Please login to your account</p>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@example.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="........" required />

        <button type="submit">Login</button>

        <!-- Forgot password link -->
        <p><a href="forgot.html">Forgot your password?</a></p>

        <!-- Google Login Button -->
        <div 
          id="g_id_onload"
          data-client_id="1019512196971-fpvp8ae7de9pni2q8lk314t4a7qbct55.apps.googleusercontent.com"
          data-context="signin"
          data-ux_mode="popup"
          data-callback="handleCredentialResponse"
          data-auto_prompt="false">
        </div>

        <div class="g_id_signin" data-type="standard"></div>

        <!-- Footer -->
        <div class="footer">
          <p>Don’t have an account? <a href="register.html">Register</a></p>
        </div>
      </form>
    </div>

    <!-- Google Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
    // Normal login form
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const response = await fetch('http://localhost:5000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();
      if(data.token){
        localStorage.setItem('token', data.token);
        alert(`Welcome ${data.user.name}`);
        window.location.href = 'dashboard.html';
      } else {
        alert(data.msg || 'Login failed');
      }
    });

    // Google login
    function handleGoogleLogin(response) {
      fetch('http://localhost:5000/google-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: response.credential })
      })
      .then(res => res.json())
      .then(data => {
        if(data.token){
          localStorage.setItem('token', data.token);
          alert(`Welcome ${data.user.name}`);
          window.location.href = 'dashboard.html';
        } else {
          alert(data.msg || 'Google login failed');
        }
      });
    }
  </script>
  </body>    
</html>
